services:
  # ── Django Auth API ──
  - type: web
    name: nexora-django
    runtime: python
    region: oregon
    plan: free
    rootDir: backend/django_core
    buildCommand: bash build.sh
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set manually to your Vercel URL
      - key: DATABASE_URL
        fromDatabase:
          name: nexora-db
          property: connectionString

  # ── Flask AI Service ──
  - type: web
    name: nexora-flask
    runtime: python
    region: oregon
    plan: free
    rootDir: backend/flask_services
    buildCommand: bash build.sh
    startCommand: gunicorn -w 1 --threads 4 app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: DJANGO_API_URL
        value: https://nexora-django.onrender.com
      - key: FLASK_SECRET_KEY
        generateValue: true

databases:
  - name: nexora-db
    plan: free
    region: oregon
