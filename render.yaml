services:
  # ── Django Auth API ──
  - type: web
    name: nexora-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend/django_core
    buildCommand: bash build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT core.asgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://nexora-ai.vercel.app"
      - key: GOOGLE_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: nexora-db
          property: connectionString


databases:
  - name: nexora-db
    plan: free
    region: oregon
